name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "PROJECT_FIX_*.md"
      - "releases/screenshots/**"
      - "LICENSE"
      - ".gitignore"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "PROJECT_FIX_*.md"
      - "releases/screenshots/**"
      - "LICENSE"
      - ".gitignore"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-test:
    name: Rust tests & clippy (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, ubuntu-24.04-arm, windows-11-arm]
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux Tauri deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf \
            xdg-utils

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: ${{ matrix.os }}

      - name: rustfmt
        working-directory: src-tauri
        run: cargo fmt --all -- --check

      - name: clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

      - name: Tests
        working-directory: src-tauri
        run: cargo test --all

  frontend:
    name: Frontend build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm test
      - run: npm run build

  tauri-build:
    name: Tauri build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [rust-test, frontend]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, ubuntu-24.04-arm, windows-11-arm]
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux Tauri deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf \
            xdg-utils

      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: ${{ matrix.os }}

      - run: npm ci

      - name: Tauri build (debug, skip bundle)
        run: npx tauri build --debug --no-bundle

  # ---------------------------------------------------------------------------
  # v0.11.0 — Automated GUI launch-smoke. The enabling task for "no Windows PC"
  # development: an in-CI launch-survival gate that catches the two historical
  # launch-incident classes without a human on a VM:
  #   * crash-on-launch (v0.8.0 BEX64) — process dies before frontend-ready
  #   * white-screen    (v0.2.11)      — React never mounts, marker never written
  # (The wrong-binary class, v0.2.10, is guarded by release.yml's bundle check.)
  #
  # Builds a RELEASE binary (crash/panic behaviour is release-specific:
  # windows_subsystem="windows", no console attached) with --no-bundle, launches
  # it in smoke mode (CLI_PULSE_SMOKE_MARKER set → the on-mount frontend effect
  # writes the marker), and asserts process-alive + marker + (soft) window +
  # screenshot. See scripts/ci-smoke-launch.{ps1,sh}.
  smoke-launch-windows:
    name: GUI launch-smoke (windows)
    runs-on: windows-latest
    needs: [rust-test, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: smoke-windows
      - run: npm ci
      - name: Build release (no bundle)
        run: npx tauri build --no-bundle
      - name: Launch-smoke
        shell: pwsh
        run: ./scripts/ci-smoke-launch.ps1
      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: launch-smoke-windows
          path: smoke-artifacts/
          if-no-files-found: ignore

  smoke-launch-linux:
    name: GUI launch-smoke (linux)
    runs-on: ubuntu-latest
    needs: [rust-test, frontend]
    # Advisory for the first ship: WebKitGTK render under xvfb on ubuntu-latest
    # is unproven headlessly (the web process can fail to paint even with the
    # sandbox disabled). Windows is the hard gate; promote Linux to blocking
    # once a few runs confirm the marker reliably lands.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install Tauri runtime + smoke deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf \
            xdg-utils \
            xvfb \
            xdotool \
            imagemagick
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: smoke-linux
      - run: npm ci
      - name: Build release (no bundle)
        run: npx tauri build --no-bundle
      - name: Launch-smoke (xvfb)
        # WebKitGTK on Ubuntu 24.04 headless: disable the web-process sandbox +
        # compositing so the WebView renders under xvfb instead of crashing the
        # web process (a well-known Tauri-on-CI gotcha).
        env:
          WEBKIT_DISABLE_COMPOSITING_MODE: "1"
          WEBKIT_DISABLE_SANDBOX_THIS_IS_DANGEROUS: "1"
        run: xvfb-run -a --server-args="-screen 0 1280x800x24" bash scripts/ci-smoke-launch.sh
      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: launch-smoke-linux
          path: smoke-artifacts/
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Terminal epic (v0.11.0) — PTY streaming-smoke. Runs `bin/terminal_smoke`,
  # which spawns a short child, drives ConPtyTransport directly, and asserts
  # stdout arrives INCREMENTALLY (bytes seen while the child is still running,
  # across multiple reads) — not drained at exit. This is the local, provable
  # signal the streaming terminal needs; it exercises portable-pty's ConPTY
  # (Windows) / openpty (Linux) paths headlessly. The smoke SKIPs (exit 0) if
  # no PTY can be allocated, so it never false-fails.
  #
  # Advisory (continue-on-error) until a few runs confirm the runners allocate
  # a PTY reliably; then promote to a hard gate. Mirrors the launch-smoke
  # advisory-first rollout.
  terminal-smoke:
    name: PTY streaming-smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [rust-test]
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux Tauri deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf
      - uses: dtolnay/rust-toolchain@stable
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: terminal-smoke-${{ matrix.os }}
      - name: Run PTY streaming-smoke
        working-directory: src-tauri
        run: cargo run --bin terminal_smoke
