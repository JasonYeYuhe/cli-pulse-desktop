name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (must already exist, format vX.Y.Z)"
        required: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  publish:
    name: Build & publish (${{ matrix.platform }} / ${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            arch: x64
            os: windows-latest
            bundles: "nsis"
            rust-target: x86_64-pc-windows-msvc
          - platform: windows
            arch: arm64
            os: windows-11-arm
            bundles: "nsis"
            rust-target: aarch64-pc-windows-msvc
          - platform: linux
            arch: x64
            os: ubuntu-latest
            bundles: "deb,rpm,appimage"
            rust-target: x86_64-unknown-linux-gnu
          - platform: linux
            arch: arm64
            os: ubuntu-24.04-arm
            bundles: "deb,rpm,appimage"
            rust-target: aarch64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install Linux Tauri deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf \
            xdg-utils

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: ${{ matrix.rust-target }}

      - run: npm ci

      - name: Build & sign & attach to Release
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Bake the DSN at compile time via `option_env!` in
          # src-tauri/src/sentry_init.rs. The DSN is a public key (per
          # Sentry docs) — the privacy guarantees come from org-level
          # Data Scrubbers + client-side $HOME path scrubbing in
          # before_send. PRs and forks build with no DSN by default →
          # Sentry init is a no-op for those builds.
          CLI_PULSE_SENTRY_DSN: ${{ secrets.CLI_PULSE_SENTRY_DSN }}
        with:
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: "CLI Pulse Desktop ${{ github.event.inputs.tag || github.ref_name }}"
          releaseBody: |
            Auto-generated release. See [CHANGELOG.md](https://github.com/JasonYeYuhe/cli-pulse-desktop/blob/main/CHANGELOG.md) for details.
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
          args: --bundles ${{ matrix.bundles }} --target ${{ matrix.rust-target }}

      # WHY: v0.1.0–v0.2.9 silently shipped Windows NSIS / Linux .deb / .rpm
      # containing only the `scan_cli` sidecar diagnostic binary (cargo picked
      # the wrong default bin in a multi-bin crate). Sizes were ~600 KB instead
      # of ~7 MB. AppImage bundler resolves binaries differently and was
      # unaffected. This step is the regression guard: assert size + inspect
      # archive for the GUI binary by name. Failure here makes the matrix job
      # red so the human un-draft gate catches it.
      - name: Verify bundle contains GUI binary (regression guard)
        shell: bash
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE/src-tauri/target/${{ matrix.rust-target }}/release/bundle"
          echo "=== bundle/ contents ==="
          find . -maxdepth 4 -type f -size +1c | head -40
          echo "=== checks ==="
          stat_size() { stat -c%s "$1" 2>/dev/null || stat -f%z "$1"; }
          fail() { echo "::error::$1"; exit 1; }
          case "${{ matrix.platform }}" in
            windows)
              EXE=$(ls nsis/*-setup.exe 2>/dev/null | head -1) || true
              [ -n "${EXE:-}" ] || fail "no NSIS *-setup.exe found"
              SIZE=$(stat_size "$EXE")
              echo "NSIS $EXE: $SIZE bytes"
              [ "$SIZE" -ge 3000000 ] || fail "NSIS < 3MB ($SIZE B) — likely missing GUI binary"
              # 7z is preinstalled on windows-latest and windows-11-arm
              if 7z l "$EXE" | grep -qE "cli-pulse-desktop\.exe$"; then
                echo "✅ NSIS contains cli-pulse-desktop.exe"
              else
                echo "::group::NSIS file list"
                7z l "$EXE" | tail -50
                echo "::endgroup::"
                fail "NSIS does NOT contain cli-pulse-desktop.exe"
              fi
              ;;
            linux)
              DEB=$(ls deb/*.deb 2>/dev/null | head -1) || true
              [ -n "${DEB:-}" ] || fail "no .deb found"
              SIZE=$(stat_size "$DEB")
              echo ".deb $DEB: $SIZE bytes"
              [ "$SIZE" -ge 3000000 ] || fail ".deb < 3MB ($SIZE B) — likely missing GUI binary"
              if dpkg-deb -c "$DEB" | grep -qE "usr/bin/cli-pulse-desktop$"; then
                echo "✅ .deb contains usr/bin/cli-pulse-desktop"
              else
                echo "::group::.deb file list"
                dpkg-deb -c "$DEB" | tail -30
                echo "::endgroup::"
                fail ".deb does NOT contain usr/bin/cli-pulse-desktop"
              fi
              RPM=$(ls rpm/*.rpm 2>/dev/null | head -1) || true
              if [ -n "${RPM:-}" ]; then
                SIZE=$(stat_size "$RPM")
                echo ".rpm $RPM: $SIZE bytes"
                [ "$SIZE" -ge 3000000 ] || fail ".rpm < 3MB ($SIZE B)"
              fi
              APPIMG=$(ls appimage/*.AppImage 2>/dev/null | head -1) || true
              if [ -n "${APPIMG:-}" ]; then
                SIZE=$(stat_size "$APPIMG")
                echo "AppImage $APPIMG: $SIZE bytes"
                [ "$SIZE" -ge 30000000 ] || fail "AppImage < 30MB ($SIZE B)"
              fi
              ;;
          esac
          echo "✅ All bundle checks passed"
